spring.application.name=ACPeltierBackend

server.port=8080
server.address=0.0.0.0
app.deviceKey=${APP_DEVICEKEY:CHANGE_ME_DEVICE_KEY}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL:jdbc:postgresql://ep-frosty-wildflower-a9rlrgif-pooler.gwc.azure.neon.tech/neondb?sslmode=require}
