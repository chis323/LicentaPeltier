spring.application.name=ACPeltierBackend
server.port=8080
server.address=0.0.0.0

app.apiKey=${APP_APIKEY:CHANGE_ME_API_KEY}
app.deviceKey=${APP_DEVICEKEY:CHANGE_ME_DEVICE_KEY}

spring.datasource.url=jdbc:h2:file:./data/acpeltier;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC